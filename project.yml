name: gowi
options:
  bundleIdPrefix: com.lloydmajor
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: NO

targets:
  Gowi:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/Gowi
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lloydmajor.gowi
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Gowi.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEFINES_MODULE: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          ENABLE_TESTABILITY: YES
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: "DV3JKTPML2"
          ENABLE_TESTABILITY: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"

  GowiTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/GowiTests
      - path: Sources/Gowi
        excludes:
          - "GowiApp.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lloydmajor.gowi.tests
        GENERATE_INFOPLIST_FILE: YES

  GowiUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/GowiUITests
    dependencies:
      - target: Gowi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lloydmajor.gowi.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Gowi
        ENABLE_HARDENED_RUNTIME: NO

schemes:
  gowi:
    build:
      targets:
        Gowi: all
        GowiTests: [test]
        GowiUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GowiTests
        - GowiUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
