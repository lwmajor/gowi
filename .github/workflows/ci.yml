name: CI

on:
  pull_request:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-ci:
    runs-on: macos-latest

    env:
      DERIVED_DATA: ${{ runner.temp }}/DerivedData

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create Secrets.swift from template
        run: cp Secrets.swift.template Sources/Gowi/Secrets.swift

      - name: Generate Xcode project
        run: xcodegen generate

      # Cache DerivedData (includes SPM SourcePackages + built products).
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ env.DERIVED_DATA }}
          key: ${{ runner.os }}-deriveddata-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-${{ github.ref_name }}-
            ${{ runner.os }}-deriveddata-

      - name: Build + test (macOS)
        run: |
          set -euo pipefail
          xcodebuild \
            -project gowi.xcodeproj \
            -scheme gowi \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath "${DERIVED_DATA}" \
            clean test
